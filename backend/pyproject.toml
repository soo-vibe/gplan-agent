[tool.ruff]
line-length = 120
exclude = ["__pycache__", ".pytest_cache", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "W", "B", "C4", "SIM", "UP", "I"]
# E402: app.py needs load_dotenv() before importing modules that read env vars,
#       and logging_setup.configure() needs to happen before our own modules
#       grab loggers. This is the documented Python idiom for that pattern.
# E501: handled by line-length above (raised to 100 to leave docstrings alone).
# SIM105: contextlib.suppress is more Pythonic but our existing try/except/pass
#         blocks are clear and don't pull in another import.
ignore = ["E402", "SIM105"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # asserts are fine in tests
